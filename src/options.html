<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Threads Country Badge</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        color: #111;
        font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      label {
        display: grid;
        gap: 6px;
        margin: 12px 0;
      }

      select,
      input[type="number"] {
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        padding: 8px;
        font: inherit;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button {
        width: 100%;
        margin-top: 12px;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        color: white;
        background: #111;
        font: inherit;
        cursor: pointer;
      }

      .status {
        min-height: 20px;
        margin-top: 10px;
        color: #167c3a;
      }
    </style>
  </head>
  <body>
    <h1>Threads Country Badge</h1>
    <label>
      표시 방식
      <select id="badgeMode">
        <option value="flag">국기 이모지</option>
        <option value="country">국가명</option>
        <option value="both">국기 + 국가명</option>
      </select>
    </label>
    <label class="row">
      <input id="showUnknown" type="checkbox" />
      국가 미확인 계정도 (?) 표시
    </label>
    <label class="row">
      <input id="debugMode" type="checkbox" />
      디버그 로그 활성화
    </label>
    <label class="row">
      <input id="debugShowOverlay" type="checkbox" />
      페이지 상태 패널 표시
    </label>
    <label class="row">
      <input id="useTemplateReplay" type="checkbox" />
      캡처된 요청 템플릿으로 자동 조회
    </label>
    <label class="row">
      <input id="useFallbackConstruction" type="checkbox" />
      불안정한 직접 요청 fallback 허용
    </label>
    <label>
      성공 캐시 기간(일)
      <input id="cacheSuccessDays" type="number" min="1" max="90" />
    </label>
    <label>
      미확인 캐시 기간(시간)
      <input id="cacheMissHours" type="number" min="1" max="168" />
    </label>
    <button id="save" type="button">저장</button>
    <button id="clearCache" type="button">프로필 캐시 삭제</button>
    <div id="status" class="status" role="status"></div>
    <script type="module" src="options.js"></script>
  </body>
</html>
